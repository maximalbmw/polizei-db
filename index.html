<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>POLIS – Polizei Informationssystem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">

      <img 
        src="logo-polizei-hessen.png"
        class="login-logo"
        alt="Polizei Hessen Logo"
      >

      <h1>POLIS // Zugriffskontrolle</h1>

      <label>Benutzername</label>
      <input type="text" id="username" placeholder="ics-operator-01">

      <label>Passwort</label>
      <input type="password" id="password" placeholder="••••••••">

      <button id="login-btn">Anmelden</button>
      <div class="login-status" id="login-status"></div>
    </div>
  </div>

  <!-- APP -->
  <div class="app" id="app" style="display:none;">
    <header class="topbar">
      <div class="topbar-left">
        <img 
          src="logo-polizei-hessen.png"
          class="topbar-logo"
          alt="Polizei Hessen Logo"
        >
        <span class="logo">POLIS</span>
        <span class="subtitle">Polizei-Lagedatenbank // Intern</span>
      </div>

      <div class="topbar-right">
        <span id="user-display"></span>
        <span class="badge badge-green">VERBUNDEN</span>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar">
        <h2>Module</h2>
        <ul>
          <li class="active">Personen</li>
          <li id="admin-btn">Admin</li>
        </ul>

        <div class="sidebar-footer">
          <div>Audit-Log</div>
          <small id="audit-log">Zugriff protokolliert…</small>
        </div>
      </nav>

      <main class="main">

        <!-- SUCHE -->
        <section class="search-section">
          <div class="search-row">
            <input type="text" id="search-input" placeholder="Suche nach Name, ID, Region…">
            <button id="search-btn">Suche</button>
          </div>

          <div class="filters-row">
            <select id="status-filter">
              <option value="">Status: alle</option>
              <option value="AKTIV">AKTIV</option>
              <option value="GESUCHT">GESUCHT</option>
              <option value="ARCHIVIERT">ARCHIVIERT</option>
            </select>
          </div>
        </section>

        <!-- INHALT -->
        <section class="content">
          <div class="results">
            <h2>Trefferliste</h2>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Geburtsdatum</th>
                  <th>Status</th>
                  <th>Region</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>

          <div class="details">
            <h2>Details</h2>
            <div id="details-content">
              <p>Bitte einen Datensatz aus der Liste auswählen.</p>
            </div>
          </div>
        </section>

        <!-- ADMIN PANEL -->
        <div class="admin-panel" id="admin-panel" style="display:none;">
          <h2>Neuen Datensatz hinzufügen</h2>

          <label>Name</label>
          <input type="text" id="admin-name">

          <label>Geburtsdatum</label>
          <input type="date" id="admin-dob">

          <label>Status</label>
          <select id="admin-status">
            <option value="AKTIV">AKTIV</option>
            <option value="GESUCHT">GESUCHT</option>
            <option value="ARCHIVIERT">ARCHIVIERT</option>
          </select>

          <label>Region</label>
          <input type="text" id="admin-region">

          <label>Notizen</label>
          <textarea id="admin-notes"></textarea>

          <button id="admin-save">Speichern</button>
        </div>

      </main>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="users.js"></script>
  <script src="app.js"></script>
</body>
</html>
